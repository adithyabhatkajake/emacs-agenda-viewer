name: EmacsAgendaViewer
options:
  bundleIdPrefix: com.hermitsage
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  EmacsAgendaViewer:
    type: application
    platform: iOS
    sources:
      - path: EmacsAgendaViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hermitsage.EmacsAgendaViewer
        PRODUCT_NAME: Agenda
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: EmacsAgendaViewer/Info.plist
  EmacsAgendaViewerMac:
    type: application
    platform: macOS
    sources:
      - path: EmacsAgendaViewer/Models
      - path: EmacsAgendaViewer/Networking
      - path: EmacsAgendaViewer/State
      - path: EmacsAgendaViewer/Theme.swift
      - path: EmacsAgendaViewer/Views/Components
      - path: EmacsAgendaViewer/Views/ContentStates.swift
      - path: EmacsAgendaViewer/Assets.xcassets
      - path: EmacsAgendaViewerMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hermitsage.EmacsAgendaViewerMac
        PRODUCT_NAME: Agenda
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: EmacsAgendaViewerMac/Info.plist
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
