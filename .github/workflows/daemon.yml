name: daemon

on:
  push:
    branches: [main, rust-index-daemon]
    paths:
      - 'daemon/**'
      - '.github/workflows/daemon.yml'
  pull_request:
    paths:
      - 'daemon/**'
      - '.github/workflows/daemon.yml'

defaults:
  run:
    working-directory: daemon

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pin toolchain
        run: rustup show
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo build
        run: cargo build --all-targets
      - name: cargo test
        run: cargo test --all
